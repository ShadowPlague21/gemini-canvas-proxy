<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Gemini Canvas Proxy</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3/dist/htm.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080a0f;
            --surface: #0f1218;
            --surface-2: #161b24;
            --border: rgba(255, 255, 255, 0.06);
            --border-bright: rgba(255, 255, 255, 0.1);
            --text: #e8edf5;
            --text-secondary: #7a8599;
            --text-dim: #4a5568;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.12);
            --accent-soft: rgba(99, 102, 241, 0.08);
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.15);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.12);
            --yellow: #f59e0b;
            --yellow-glow: rgba(245, 158, 11, 0.12);
            --radius: 14px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 580px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        /* ── Header ───────────────────────────────────────────── */

        .header {
            margin-bottom: 28px;
        }

        .header-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 6px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .header p {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-left: 54px;
        }

        /* ── Status Bar ───────────────────────────────────────── */

        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }

        .status-bar.online { border-color: rgba(16, 185, 129, 0.2); }
        .status-bar.offline { border-color: rgba(239, 68, 68, 0.2); }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.online {
            background: var(--green);
            box-shadow: 0 0 8px var(--green), 0 0 20px var(--green-glow);
        }

        .status-dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red-glow); }

        .status-dot.waiting {
            background: var(--yellow);
            box-shadow: 0 0 8px var(--yellow-glow);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .status-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text);
        }

        .status-badge {
            margin-left: auto;
            font-size: 0.65rem;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 6px;
            letter-spacing: 0.02em;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-badge.active {
            background: var(--green-glow);
            color: var(--green);
        }

        .status-badge.inactive {
            background: var(--red-glow);
            color: var(--red);
        }

        /* ── Stats ────────────────────────────────────────────── */

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 14px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        .stat-value.default { color: var(--accent); }
        .stat-value.success { color: var(--green); }
        .stat-value.error { color: var(--red); }

        .stat-label {
            font-size: 0.62rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* ── Log ──────────────────────────────────────────────── */

        .log-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
        }

        .log-header-title {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .log-header-count {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .log-container {
            max-height: 300px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .log-container::-webkit-scrollbar { width: 5px; }
        .log-container::-webkit-scrollbar-track { background: transparent; }
        .log-container::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 3px;
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            line-height: 1.4;
            transition: background 0.15s;
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .log-time {
            color: var(--text-dim);
            flex-shrink: 0;
            font-size: 0.62rem;
            min-width: 52px;
        }

        .log-indicator {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .log-indicator.request { background: var(--accent); }
        .log-indicator.success { background: var(--green); }
        .log-indicator.error { background: var(--red); }
        .log-indicator.info { background: var(--text-dim); }

        .log-text {
            color: var(--text);
            word-break: break-all;
            flex: 1;
        }

        .log-text.success { color: var(--green); }
        .log-text.error { color: var(--red); }
        .log-text.info { color: var(--text-secondary); }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .empty-state-hint {
            font-size: 0.68rem;
            color: var(--text-dim);
            margin-top: 6px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── Footer ───────────────────────────────────────────── */

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.62rem;
            color: var(--text-dim);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
const html = htm.bind(React.createElement);

// ═══════════════════════════════════════════════════════════════
// CANVAS AUTO-INJECT — Canvas replaces the empty string with
// the real API key at compile time. DO NOT modify this line.
// ═══════════════════════════════════════════════════════════════
const apiKey = "";

const { useState, useEffect, useRef, useCallback } = React;

function App() {
    const [status, setStatus] = useState('waiting');
    const [logs, setLogs] = useState([]);
    const [stats, setStats] = useState({ total: 0, success: 0, errors: 0 });
    const logEndRef = useRef(null);

    // ── Request deduplication ──────────────────────────────────────────
    // The content script posts to ALL iframes + main window for reliability
    // (sandbox cross-origin makes iframe targeting unreliable). This means
    // we may receive the same request multiple times. We track seen IDs and
    // skip duplicates. Entries expire after 30 seconds.
    var seenRequests = useRef({});
    var seenCleanupTimer = useRef(null);

    // Clean up seen request IDs every 30 seconds
    useEffect(function() {
        seenCleanupTimer.current = setInterval(function() {
            var now = Date.now();
            Object.keys(seenRequests.current).forEach(function(key) {
                if (now - seenRequests.current[key] > 30000) {
                    delete seenRequests.current[key];
                }
            });
        }, 30000);
        return function() { clearInterval(seenCleanupTimer.current); };
    }, []);

    const addLog = useCallback((indicator, text, type) => {
        type = type || 'info';
        var time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        setLogs(function(prev) {
            return prev.concat({ time: time, indicator: indicator, text: text, type: type, id: Date.now() + Math.random() }).slice(-150);
        });
        if (type === 'success') setStats(function(s) { return { total: s.total + 1, success: s.success + 1, errors: s.errors }; });
        else if (type === 'error') setStats(function(s) { return { total: s.total + 1, success: s.success, errors: s.errors + 1 }; });
    }, []);

    useEffect(function() {
        if (logEndRef.current) logEndRef.current.scrollIntoView({ behavior: 'smooth' });
    }, [logs]);

    useEffect(function() {
        var timer = setTimeout(function() {
            window.parent.postMessage({ source: 'gemini-proxy-ready' }, '*');
            setStatus('online');
            addLog('info', 'Proxy ready — waiting for requests', 'info');
        }, 500);
        return function() { clearTimeout(timer); };
    }, [addLog]);

    useEffect(function() {
        function handleMessage(event) {
            var data = event.data;
            if (!data || data.source !== 'gemini-proxy-request') return;

            var id = data.id;

            // ── Deduplicate: skip if we've already seen this request ID ──
            // The content script posts to all iframes + main window, so we
            // receive the same request multiple times. Only process the first.
            if (seenRequests.current[id]) return;
            seenRequests.current[id] = Date.now();

            var method = data.method || 'POST';
            var path = data.path;
            var body = data.body;
            var headers = data.headers;
            addLog('request', method + ' ' + path.replace('/v1beta/models/', '').replace(':generateContent', ''));

            var url = 'https://generativelanguage.googleapis.com' + path;
            if (apiKey) {
                url += (url.indexOf('?') >= 0 ? '&' : '?') + 'key=' + encodeURIComponent(apiKey);
            }

            fetch(url, {
                method: method,
                headers: Object.assign({ 'Content-Type': 'application/json' }, headers || {}),
                body: body ? JSON.stringify(body) : undefined
            }).then(function(response) {
                addLog(response.ok ? 'success' : 'error',
                    response.status + ' ' + (response.ok ? 'OK' : (response.statusText || 'Error')),
                    response.ok ? 'success' : 'error');
                return response.json().catch(function() { return {}; }).then(function(respData) {
                    window.parent.postMessage({
                        source: 'gemini-proxy-response',
                        id: id,
                        status: response.status,
                        data: respData,
                        error: response.ok ? null : 'API ' + response.status
                    }, '*');
                });
            }).catch(function(err) {
                addLog('error', err.message, 'error');
                window.parent.postMessage({ source: 'gemini-proxy-response', id: id, error: err.message }, '*');
            });
        }

        window.addEventListener('message', handleMessage);
        return function() { window.removeEventListener('message', handleMessage); };
    }, [addLog]);

    var sc = {
        waiting: { label: 'Connecting...', badge: 'WAITING', badgeClass: 'inactive' },
        online: { label: 'Proxy Active', badge: 'LIVE', badgeClass: 'active' },
        offline: { label: 'Disconnected', badge: 'OFFLINE', badgeClass: 'inactive' }
    }[status];

    return html`
        <div className="app">
            <div className="header">
                <div className="header-row">
                    <div className="header-icon">⚡</div>
                    <h1>Gemini Canvas Proxy</h1>
                </div>
                <p>Free unlimited Gemini API via Canvas postMessage bridge</p>
            </div>

            <div className=${'status-bar ' + status}>
                <div className=${'status-dot ' + status}></div>
                <span className="status-label">${sc.label}</span>
                <span className=${'status-badge ' + sc.badgeClass}>${sc.badge}</span>
            </div>

            <div className="stats-row">
                <div className="stat-card">
                    <div className="stat-value default">${stats.total}</div>
                    <div className="stat-label">Requests</div>
                </div>
                <div className="stat-card">
                    <div className="stat-value success">${stats.success}</div>
                    <div className="stat-label">Success</div>
                </div>
                <div className="stat-card">
                    <div className="stat-value error">${stats.errors}</div>
                    <div className="stat-label">Errors</div>
                </div>
            </div>

            <div className="log-card">
                <div className="log-header">
                    <span className="log-header-title">Activity Log</span>
                    <span className="log-header-count">${logs.length} entries</span>
                </div>
                <div className="log-container">
                    ${logs.length === 0
                        ? html`
                            <div className="empty-state">
                                <div className="empty-state-icon">📡</div>
                                <div className="empty-state-text">Waiting for requests</div>
                                <div className="empty-state-hint">curl http://127.0.0.1:8765/v1/chat/completions</div>
                            </div>`
                        : logs.map(function(log) {
                            return html`
                                <div key=${log.id} className="log-entry">
                                    <span className="log-time">${log.time}</span>
                                    <span className=${'log-indicator ' + log.indicator}></span>
                                    <span className=${'log-text ' + log.type}>${log.text}</span>
                                </div>
                            `;
                        })
                    }
                    <div ref=${logEndRef} />
                </div>
            </div>

            <div className="footer">
                <a href="https://github.com/pranrichh/gemini-canvas-proxy" target="_blank">gemini-canvas-proxy</a> · postMessage bridge · no WebSocket · no LNA issues
            </div>
        </div>
    `;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
